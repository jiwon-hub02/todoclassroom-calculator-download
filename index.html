<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토도 견적 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      padding: 32px 20px;
    }
    .calc-section {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e8e8e8;
      padding: 24px;
      max-width: 680px;
      margin: 0 auto 20px;
    }
    .calc-section h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #1a1a1a; }
    .school-input-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .school-input-wrap label { font-size: 14px; color: #555; white-space: nowrap; min-width: 60px; }
    .school-input-wrap input[type=text] {
      flex: 1; padding: 8px 12px; font-size: 14px;
      border: 1px solid #ddd; border-radius: 6px; color: #1a1a1a; outline: none;
    }
    .school-input-wrap input[type=text]:focus { border-color: #aaa; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 12px; font-weight: 500; color: #888; text-align: left; padding: 8px 10px; border-bottom: 1px solid #e8e8e8; }
    th.center { text-align: center; }
    th.right { text-align: right; }
    td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; font-size: 14px; color: #1a1a1a; vertical-align: middle; }
    td.center { text-align: center; }
    td.right { text-align: right; }
    .product-name { font-weight: 500; font-size: 14px; }
    .unit-price { font-size: 12px; color: #999; margin-top: 2px; }
    input[type=number] {
      width: 60px; padding: 6px 4px; font-size: 14px;
      border: 1px solid #ddd; border-radius: 6px;
      background: #fff; color: #1a1a1a; text-align: center;
      outline: none; display: block; margin: 0 auto;
    }
    input[type=number]:focus { border-color: #aaa; }
    .row-total { font-weight: 500; font-size: 14px; }
    .divider-row td { border-top: 1.5px solid #ccc; border-bottom: none; padding-top: 14px; padding-bottom: 8px; }
    .total-label { font-weight: 500; font-size: 15px; }
    .total-amount { font-size: 20px; font-weight: 600; }
    .notice { margin-top: 16px; padding: 10px 14px; background: #eef4fd; border-radius: 8px; font-size: 13px; color: #2a5caa; line-height: 1.6; }
    .notice-example { color: #666; font-size: 12px; margin-top: 4px; }
    .btn-wrap { display: flex; gap: 10px; max-width: 680px; margin: 0 auto; }
    .btn-reset { flex: 1; padding: 10px; font-size: 14px; color: #888; background: #fff; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
    .btn-reset:hover { background: #f5f5f5; }
    .btn-pdf {
      flex: 2; padding: 10px; font-size: 14px; font-weight: 500;
      color: #fff; background: #2f2b6b; border: none; border-radius: 8px;
      cursor: pointer; text-decoration: none; text-align: center;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-pdf:hover { background: #3d3894; }
  </style>
</head>
<body>

  <div class="calc-section">
    <h2>견적 계산기</h2>
    <div class="school-input-wrap">
      <label>학교명</label>
      <input type="text" id="school-name" placeholder="예: 서울 토도초등학교" oninput="updateLink()">
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:32%">제품</th>
          <th style="width:22%" class="center">이용 개월 수</th>
          <th style="width:22%" class="center">학생 수</th>
          <th style="width:24%" class="right">총액</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><div class="product-name">토도한글</div><div class="unit-price">월 13,500원/명</div></td>
          <td class="center"><input type="number" id="months-0" min="0" value="0" oninput="calc(); updateLink();"></td>
          <td class="center"><input type="number" id="students-0" min="0" value="0" oninput="calc(); updateLink();"></td>
          <td class="right"><span class="row-total" id="total-0">0원</span></td>
        </tr>
        <tr>
          <td><div class="product-name">토도수학</div><div class="unit-price">월 6,500원/명</div></td>
          <td class="center"><input type="number" id="months-1" min="0" value="0" oninput="calc(); updateLink();"></td>
          <td class="center"><input type="number" id="students-1" min="0" value="0" oninput="calc(); updateLink();"></td>
          <td class="right"><span class="row-total" id="total-1">0원</span></td>
        </tr>
        <tr>
          <td><div class="product-name">토도영어</div><div class="unit-price">월 20,000원/명</div></td>
          <td class="center"><input type="number" id="months-2" min="0" value="0" oninput="calc(); updateLink();"></td>
          <td class="center"><input type="number" id="students-2" min="0" value="0" oninput="calc(); updateLink();"></td>
          <td class="right"><span class="row-total" id="total-2">0원</span></td>
        </tr>
      </tbody>
      <tfoot>
        <tr class="divider-row">
          <td colspan="3" class="total-label">합계</td>
          <td class="right"><span class="total-amount" id="grand-total">0원</span></td>
        </tr>
      </tfoot>
    </table>
    <div class="notice">
      4개월 이상 구매 시 여름방학 1개월을 무료로 제공해 드립니다.
      <div class="notice-example">예: 8개월 이용을 희망하시면 7개월을 작성해 주세요.</div>
    </div>
  </div>

  <div class="btn-wrap">
    <button class="btn-reset" onclick="resetCalc()">초기화</button>
    <a id="quote-link" class="btn-pdf" href="#" target="_blank" onclick="return checkBeforeOpen()">견적서 PDF 다운로드</a>
  </div>

  <script>
    const prices = [13500, 6500, 20000];

    function fmt(n) { return n.toLocaleString('ko-KR') + '원'; }

    function calc() {
      let grand = 0;
      for (let i = 0; i < 3; i++) {
        const m = parseInt(document.getElementById('months-' + i).value) || 0;
        const s = parseInt(document.getElementById('students-' + i).value) || 0;
        grand += prices[i] * m * s;
        document.getElementById('total-' + i).textContent = fmt(prices[i] * m * s);
      }
      document.getElementById('grand-total').textContent = fmt(grand);
    }

    function updateLink() {
      const school = document.getElementById('school-name').value.trim();
      const params = new URLSearchParams();
      params.set('school', school);
      for (let i = 0; i < 3; i++) {
        params.set('m' + i, document.getElementById('months-' + i).value || 0);
        params.set('s' + i, document.getElementById('students-' + i).value || 0);
      }
      document.getElementById('quote-link').href = 'quote.html?' + params.toString();
    }

    function checkBeforeOpen() {
      const school = document.getElementById('school-name').value.trim();
      if (!school) {
        alert('학교명을 입력해주세요.');
        return false;
      }
      return true;
    }

    function resetCalc() {
      for (let i = 0; i < 3; i++) {
        document.getElementById('months-' + i).value = 0;
        document.getElementById('students-' + i).value = 0;
        document.getElementById('total-' + i).textContent = '0원';
      }
      document.getElementById('grand-total').textContent = '0원';
      document.getElementById('school-name').value = '';
      updateLink();
    }

    updateLink();
  </script>
</body>
</html>

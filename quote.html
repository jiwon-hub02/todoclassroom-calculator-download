<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>토도 견적서</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .status { font-size: 15px; color: #555; margin-bottom: 20px; }
    .btn-retry {
      padding: 10px 24px; font-size: 14px; font-weight: 500;
      color: #fff; background: #2f2b6b; border: none;
      border-radius: 8px; cursor: pointer; display: none;
    }
    .btn-retry:hover { background: #3d3894; }

    #quote-doc {
      display: none;
      width: 794px;
      padding: 60px 60px 40px;
      background: #fff;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      font-size: 12px;
      color: #111;
    }
    .q-title { text-align: center; font-size: 28px; font-weight: 700; letter-spacing: 12px; margin-bottom: 32px; }
    .q-info-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    .q-info-table td { border: 1px solid #bbb; padding: 7px 10px; font-size: 12px; vertical-align: middle; }
    .q-info-table .label { background: #f0f0f0; font-weight: 600; text-align: center; width: 90px; white-space: nowrap; }
    .q-info-table .supplier-label { background: #f0f0f0; font-weight: 600; text-align: center; width: 30px; writing-mode: vertical-rl; white-space: nowrap; }
    .q-info-table .val-center { text-align: center; vertical-align: middle; }
    .logo-inline { float: right; height: 30px; width: auto; margin-left: 12px; }
    .q-items-table { width: 100%; border-collapse: collapse; }
    .q-items-table th { background: #e8e8e8; border: 1px solid #bbb; padding: 7px 6px; text-align: center; font-size: 12px; font-weight: 600; }
    .q-items-table td { border: 1px solid #bbb; padding: 7px 6px; text-align: center; font-size: 12px; vertical-align: middle; }
    .q-total-row td { background: #d9d9d9; font-weight: 700; font-size: 13px; border: 1px solid #bbb; padding: 9px 6px; text-align: center; }
  </style>
</head>
<body>
  <p class="status" id="status">견적서를 생성하고 있습니다...</p>
  <button class="btn-retry" id="btn-retry" onclick="generate()">다시 다운로드</button>

  <div id="quote-doc">
    <div class="q-title">견 적 서</div>
    <table class="q-info-table">
      <tr>
        <td class="label">견적일자</td>
        <td id="q-date"></td>
      </tr>
      <tr>
        <td class="label">공급받는자</td>
        <td id="q-school" class="val-center"></td>
      </tr>
      <tr>
        <td class="supplier-label" rowspan="5">공급자</td>
        <td class="label">사업자 번호</td>
        <td class="val-center">883-86-00976</td>
      </tr>
      <tr>
        <td class="label">상호명 / 대표자</td>
        <td class="val-center">
          <img src="todo_logo.png" alt="TODO 로고" class="logo-inline">
          주식회사 에누마코리아 / 전유택
        </td>
      </tr>
      <tr>
        <td class="label">사업장 주소</td>
        <td class="val-center">서울특별시 성동구 독섬로1나길 5, G301호</td>
      </tr>
      <tr>
        <td class="label">업태/업종</td>
        <td class="val-center">서비스업, 소매업 / 소프트웨어개발 및 유통</td>
      </tr>
      <tr>
        <td class="label">문의</td>
        <td class="val-center">todoclassroom@enuma.com / 02-462-9720</td>
      </tr>
    </table>

    <table class="q-items-table">
      <thead>
        <tr>
          <th style="width:8%">번호</th>
          <th style="width:18%">상품명</th>
          <th style="width:13%">기간(개월)</th>
          <th style="width:13%">수량(명)</th>
          <th style="width:13%">단가(원)</th>
          <th style="width:13%">소계(원)</th>
          <th style="width:22%">비고</th>
        </tr>
      </thead>
      <tbody id="q-rows"></tbody>
      <tfoot>
        <tr class="q-total-row">
          <td colspan="6">총 합계 금액(vat 포함)</td>
          <td id="q-grand-total"></td>
        </tr>
      </tfoot>
    </table>
  </div>

  <script>
    const prices = [13500, 6500, 20000];
    const productNames = ['토도한글', '토도수학', '토도영어'];
    const productShortNames = ['한글', '수학', '영어'];

    function fmtNum(n) { return n.toLocaleString('ko-KR'); }

    function getToday() {
      const d = new Date();
      return d.getFullYear() + '. ' + (d.getMonth() + 1) + '. ' + d.getDate() + '.';
    }

    function getDateStr() {
      const d = new Date();
      return d.getFullYear() + ('0' + (d.getMonth() + 1)).slice(-2) + ('0' + d.getDate()).slice(-2);
    }

    function getParams() {
      const p = new URLSearchParams(window.location.search);
      return {
        school: p.get('school') || '',
        months: [p.get('m0') || 0, p.get('m1') || 0, p.get('m2') || 0],
        students: [p.get('s0') || 0, p.get('s1') || 0, p.get('s2') || 0]
      };
    }

    function buildRows(params) {
      let rows = '';
      let rowNum = 1;
      let grand = 0;
      let filledCount = 0;

      for (let i = 0; i < 3; i++) {
        const m = parseInt(params.months[i]) || 0;
        const s = parseInt(params.students[i]) || 0;
        const t = prices[i] * m * s;
        grand += t;
        const hasData = m > 0 || s > 0;
        if (hasData) filledCount++;

        let bigo = '';
        if (m >= 4) {
          bigo = '여름방학 1개월 무료 제공<br>(실 사용 기간 ' + (m + 1) + '개월 제공)';
        }

        rows += '<tr>';
        rows += '<td>' + (hasData ? rowNum++ : '') + '</td>';
        rows += '<td>' + (hasData ? productNames[i] : '') + '</td>';
        rows += '<td>' + (m > 0 ? m : '') + '</td>';
        rows += '<td>' + (s > 0 ? s : '') + '</td>';
        rows += '<td>' + (hasData ? fmtNum(prices[i]) : '') + '</td>';
        rows += '<td style="text-align:right;">' + (t > 0 ? fmtNum(t) : 0) + '</td>';
        rows += '<td style="text-align:left; font-size:11px; line-height:1.7;">' + bigo + '</td>';
        rows += '</tr>';
      }

      const extraRows = Math.max(0, 5 - filledCount);
      for (let e = 0; e < extraRows - 1; e++) {
        rows += '<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td style="text-align:right;">0</td><td></td></tr>';
      }
      rows += '<tr><td></td><td></td><td></td><td></td><td></td><td style="text-align:center; color:#555;">이하 여백</td><td></td></tr>';

      document.getElementById('q-rows').innerHTML = rows;
      document.getElementById('q-grand-total').textContent = fmtNum(grand) + '원';
    }

    function getFileName(school, params) {
      const usedProducts = [];
      for (let i = 0; i < 3; i++) {
        const m = parseInt(params.months[i]) || 0;
        const s = parseInt(params.students[i]) || 0;
        if (m > 0 || s > 0) usedProducts.push(productShortNames[i]);
      }
      const productStr = usedProducts.length > 0 ? '토도' + usedProducts.join(',') : '토도';
      return productStr + '_' + school + '_' + getDateStr();
    }

    function generate() {
      const params = getParams();
      const school = params.school;

      if (!school) {
        document.getElementById('status').textContent = '학교명 정보가 없습니다. 계산기 페이지에서 다시 시도해주세요.';
        return;
      }

      document.getElementById('q-date').textContent = getToday();
      document.getElementById('q-school').textContent = school + '\u00A0\u00A0\u00A0\u00A0귀하';
      buildRows(params);

      const el = document.getElementById('quote-doc');
      el.style.display = 'block';

      const opt = {
        margin: 0,
        filename: getFileName(school, params) + '.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait' }
      };

      document.getElementById('status').textContent = 'PDF를 생성하고 있습니다...';

      html2pdf().set(opt).from(el).save().then(() => {
        el.style.display = 'none';
        document.getElementById('status').textContent = '다운로드가 완료됐습니다. 이 창을 닫아주세요.';
        document.getElementById('btn-retry').style.display = 'inline-block';
      });
    }

    window.onload = generate;
  </script>
</body>
</html>
